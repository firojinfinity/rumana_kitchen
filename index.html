<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumana's Kitchen</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f8f4ed;
}

header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    font-size:42px;
}

header p{
    margin-top:8px;
    font-size:18px;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.menu-card{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    overflow:hidden;
}

.menu-title{
    background:#c0392b;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

.menu-item{
    display:flex;
    justify-content:space-between;
    padding:18px 25px;
    border-bottom:1px solid #ddd;
    font-size:20px;
}

.menu-item:last-child{
    border-bottom:none;
}

.price{
    color:#8B0000;
    font-weight:bold;
}

footer{
    text-align:center;
    margin:30px;
    color:#555;
    font-size:16px;
}

.order-btn{
    display:block;
    width:220px;
    margin:30px auto;
    text-align:center;
    background:#8B0000;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:30px;
    font-size:18px;
    transition:.3s;
}

.order-btn:hover{
    background:#c0392b;
}
</style>

</head>
<body>

<header>
    <h1>🍽 Rumana's Kitchen</h1>
    <p>Fresh • Homemade • Delicious</p>
</header>

<div class="container">

<div class="menu-card">

<div class="menu-title">
Today's Special Menu
</div>

<div class="menu-item">
<span>🍗 Chicken Biriyani</span>
<span class="price">₹250</span>
</div>

<div class="menu-item">
<span>🍗 Chicken Pakoda</span>
<span class="price">₹220</span>
</div>

<div class="menu-item">
<span>🍛 Shibai</span>
<span class="price">₹180</span>
</div>

<div class="menu-item">
<span>🥘 Gravy Shibai</span>
<span class="price">₹220</span>
</div>

<div class="menu-item">
<span>🧀 Paneer Masala</span>
<span class="price">₹220</span>
</div>

<div class="menu-item">
<span>🥖 Paratha</span>
<span class="price">₹20</span>
</div>

<div class="menu-item">
<span>🥖 Laccha Paratha</span>
<span class="price">₹30</span>
</div>

<div class="menu-item">
<span>🥗 Dal Pakoda</span>
<span class="price">₹100</span>
</div>

</div>

<a href="#" class="order-btn">Order Now</a>

</div>

<footer>
© 2026 Rumana's Kitchen | Homemade Food with Love ❤️
</footer>

</body>
</html>
